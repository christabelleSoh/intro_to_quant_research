<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TJC PW: Introduction to Sampling and Survey Design</title>
  
  <!-- Load Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Load FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Load React directly in the browser -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Load Babel to understand the code below -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    
    @keyframes bounce { 
      0%, 100% { transform: translateY(-15%); animation-timing-function: cubic-bezier(0.8,0,1,1); } 
      50% { transform: translateY(0); animation-timing-function: cubic-bezier(0,0,0.2,1); } 
    }
    .animate-bounce { animation: bounce 1s infinite; }
    
    @keyframes pulse-fast { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    .animate-pulse { animation: pulse-fast 1.5s ease-in-out infinite; }
    
    @keyframes spin-once { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-spin-once { animation: spin-once 0.5s ease-in-out; }
    
    @keyframes shake { 
      0%, 100% { transform: translateX(0); } 
      25% { transform: translateX(-5px); } 
      75% { transform: translateX(5px); } 
    }
    .animate-shake { animation: shake 0.3s ease-in-out; }
  </style>
</head>
<body class="bg-slate-50">

  <!-- This is where our app will be injected -->
  <div id="root"></div>

  <!-- Our Application Code -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    const SgSampleModule = () => {
      const [currentSection, setCurrentSection] = useState(1);
      const totalSections = 10;

      const nextSection = () => {
        setCurrentSection((prev) => Math.min(prev + 1, totalSections));
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      
      const prevSection = () => {
        setCurrentSection((prev) => Math.max(prev - 1, 1));
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      return (
        <div className="min-h-screen text-slate-800 font-sans selection:bg-blue-200 pb-28">
          {/* Header */}
          <header className="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
            <div className="max-w-4xl mx-auto flex justify-between items-center">
              <h1 className="text-xl md:text-2xl font-bold flex items-center gap-2">
                <i className="fa-solid fa-bullseye text-2xl"></i> TJC PW: Introduction to Sampling and Survey Design
              </h1>
              <div className="text-sm font-medium bg-blue-700 px-3 py-1 rounded-full">
                Section {currentSection} / {totalSections}
              </div>
            </div>
          </header>

          {/* Main Content Area */}
          <main className="max-w-4xl mx-auto p-4 md:p-8 mt-4 bg-white shadow-lg rounded-xl mb-8 min-h-[70vh]">
            {currentSection === 1 && <Section1 />}
            {currentSection === 2 && <Section2 />}
            {currentSection === 3 && <Section3 />}
            {currentSection === 4 && <Section4 />}
            {currentSection === 5 && <Section5 />}
            {currentSection === 6 && <Section6 />}
            {currentSection === 7 && <Section7 />}
            {currentSection === 8 && <Section8 />}
            {currentSection === 9 && <Section9 />}
            {currentSection === 10 && <Section10 />}
          </main>

          {/* Navigation Footer */}
          <footer className="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
            <div className="max-w-4xl mx-auto flex justify-between items-center">
              <button
                onClick={prevSection}
                disabled={currentSection === 1}
                className={`flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-colors ${
                  currentSection === 1 ? 'text-slate-400 cursor-not-allowed' : 'text-blue-600 hover:bg-blue-50'
                }`}
              >
                <i className="fa-solid fa-arrow-left"></i> Previous
              </button>
              
              {/* Progress Bar */}
              <div className="hidden md:flex flex-1 mx-8 h-2 bg-slate-100 rounded-full overflow-hidden">
                <div 
                  className="h-full bg-blue-500 transition-all duration-500" 
                  style={{ width: `${(currentSection / totalSections) * 100}%` }}
                ></div>
              </div>

              <button
                onClick={nextSection}
                disabled={currentSection === totalSections}
                className={`flex items-center gap-2 px-6 py-2 rounded-lg font-medium transition-colors ${
                  currentSection === totalSections ? 'bg-slate-300 text-slate-500 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-700 shadow-md hover:shadow-lg'
                }`}
              >
                {currentSection === totalSections ? 'Completed' : 'Next'}
                {currentSection !== totalSections && <i className="fa-solid fa-arrow-right"></i>}
              </button>
            </div>
          </footer>
        </div>
      );
    };

    // --- SECTION 1: OVERVIEW ---
    const Section1 = () => {
      const [draggables, setDraggables] = useState([
        { id: 1, text: 'All JC students in SG', correct: 'pop', status: 'idle' },
        { id: 2, text: '50 students from TJC', correct: 'samp', status: 'idle' },
        { id: 3, text: 'All the Laksa in the pot', correct: 'pop', status: 'idle' },
        { id: 4, text: 'One spoonful of Laksa', correct: 'samp', status: 'idle' },
      ]);
      const [quizAnswered, setQuizAnswered] = useState(null);
      const [feedbackMsg, setFeedbackMsg] = useState(null);

      const handleDragStart = (e, id) => e.dataTransfer.setData('dragId', id);
      
      const handleDrop = (e, zone) => {
        const id = parseInt(e.dataTransfer.getData('dragId'));
        const draggedItem = draggables.find(d => d.id === id);

        if (draggedItem.correct === zone) {
          setDraggables(prev => prev.map(item => {
            if (item.id === id) return { ...item, status: 'correct', droppedZone: zone };
            return item;
          }));
          setFeedbackMsg({ type: 'success', text: `Correct! "${draggedItem.text}" is a ${zone === 'pop' ? 'Population' : 'Sample'}.` });
          setTimeout(() => setFeedbackMsg(null), 3000);
        } else {
          setDraggables(prev => prev.map(item => {
            if (item.id === id) return { ...item, status: 'wrong' };
            return item;
          }));
          setFeedbackMsg({ type: 'error', text: `Oops! Try again.` });
          setTimeout(() => {
            setDraggables(prev => prev.map(item => {
              if (item.id === id) return { ...item, status: 'idle' };
              return item;
            }));
            setFeedbackMsg(null);
          }, 1500);
        }
      };

      return (
        <div className="space-y-8 animate-fadeIn">
          <div>
            <h2 className="text-3xl font-bold text-slate-800 mb-2">Section 1: The Big Ideas in Sampling</h2>
            <p className="text-slate-600 text-lg">This section establishes the fundamental vocabulary and the "why" of sampling.</p>
          </div>

          <div className="bg-slate-900 rounded-xl aspect-video flex flex-col items-center justify-center text-white relative overflow-hidden shadow-lg border-4 border-slate-800">
            {/* YouTube Embed Placeholder */}
            <iframe 
              className="w-full h-full object-cover" 
              src="https://youtube.com/embed/KJPicqtY88o" 
              title="YouTube video player" 
              frameBorder="0" 
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
              allowFullScreen>
            </iframe>
          </div>

          <div className="bg-blue-50 p-6 rounded-xl border border-blue-100">
            <h3 className="font-bold text-xl text-blue-900 mb-4">Test your understanding</h3>
            <p className="mb-4 text-slate-700">Check your understanding of the terms 'population' and 'sample' by dragging the green items into the correct boxes below.</p>
            
            <div className="h-6 mb-2">
              {feedbackMsg && (
                <div className={`text-sm font-bold flex items-center gap-2 ${feedbackMsg.type === 'success' ? 'text-green-600' : 'text-red-500 animate-pulse'}`}>
                  <i className={`fa-regular ${feedbackMsg.type === 'success' ? 'fa-circle-check' : 'fa-circle-xmark'}`}></i>
                  {feedbackMsg.text}
                </div>
              )}
            </div>

            <div className="flex flex-wrap gap-3 mb-8 min-h-[40px]">
              {draggables.filter(d => d.status === 'idle' || d.status === 'wrong').map(d => (
                <div 
                  key={d.id} 
                  draggable={d.status === 'idle'} 
                  onDragStart={(e) => handleDragStart(e, d.id)}
                  className={`px-4 py-2 rounded-lg shadow-sm font-medium transition-all ${
                    d.status === 'wrong' 
                      ? 'bg-red-100 border-2 border-red-500 text-red-800 animate-pulse' 
                      : 'bg-emerald-100 border-2 border-emerald-500 text-emerald-800 cursor-grab active:cursor-grabbing'
                  }`}
                >
                  {d.text}
                </div>
              ))}
            </div>

            <div className="grid md:grid-cols-2 gap-6">
              <div 
                onDragOver={(e) => e.preventDefault()} 
                onDrop={(e) => handleDrop(e, 'pop')}
                className="border-4 border-dashed border-slate-300 rounded-xl p-6 min-h-[150px] bg-white flex flex-col items-center transition-colors hover:border-blue-400"
              >
                <h4 className="font-bold text-slate-500 text-xl mb-4 flex items-center gap-2"><i className="fa-solid fa-users"></i> POPULATION</h4>
                {draggables.filter(d => d.status === 'correct' && d.droppedZone === 'pop').map(d => (
                  <div key={d.id} className="bg-emerald-100 text-emerald-800 px-3 py-1 rounded w-full text-center mb-2 animate-fadeIn">{d.text}</div>
                ))}
              </div>
              
              <div 
                onDragOver={(e) => e.preventDefault()} 
                onDrop={(e) => handleDrop(e, 'samp')}
                className="border-4 border-dashed border-slate-300 rounded-xl p-6 min-h-[150px] bg-white flex flex-col items-center transition-colors hover:border-blue-400"
              >
                <h4 className="font-bold text-slate-500 text-xl mb-4 flex items-center gap-2"><i className="fa-solid fa-magnifying-glass"></i> SAMPLE</h4>
                {draggables.filter(d => d.status === 'correct' && d.droppedZone === 'samp').map(d => (
                  <div key={d.id} className="bg-emerald-100 text-emerald-800 px-3 py-1 rounded w-full text-center mb-2 animate-fadeIn">{d.text}</div>
                ))}
              </div>
            </div>
          </div>

          <div className="bg-white border border-slate-200 p-6 rounded-xl shadow-sm">
            <h3 className="font-bold text-lg mb-4">Knowledge Check</h3>
            <p className="mb-4 font-medium">What is "Statistical Inference"?</p>
            <div className="space-y-3">
              <button onClick={() => setQuizAnswered('wrong1')} className={`w-full text-left p-3 rounded-lg border ${quizAnswered === 'wrong1' ? 'bg-red-50 border-red-500' : 'hover:bg-slate-50 border-slate-200'}`}>
                A. Surveying every single person in Singapore.
              </button>
              <button onClick={() => setQuizAnswered('correct')} className={`w-full text-left p-3 rounded-lg border ${quizAnswered === 'correct' ? 'bg-green-50 border-green-500 font-bold' : 'hover:bg-slate-50 border-slate-200'}`}>
                B. Using data from a small sample to make an educated guess about the whole population.
              </button>
              <button onClick={() => setQuizAnswered('wrong2')} className={`w-full text-left p-3 rounded-lg border ${quizAnswered === 'wrong2' ? 'bg-red-50 border-red-500' : 'hover:bg-slate-50 border-slate-200'}`}>
                C. Making sure your survey questions are grammar-checked.
              </button>
            </div>
            {quizAnswered === 'correct' && <p className="text-green-600 font-bold mt-4 flex items-center gap-2"><i className="fa-regular fa-circle-check"></i> Spot on! You use the sample to infer reality.</p>}
            {quizAnswered && quizAnswered !== 'correct' && <p className="text-red-500 font-bold mt-4 flex items-center gap-2"><i className="fa-regular fa-circle-xmark"></i> Not quite. Think about the Laksa example.</p>}
          </div>
        </div>
      );
    };

    // --- SECTION 2: REPRESENTATIVE VS BIAS ---
    const Section2 = () => {
      const [simState, setSimState] = useState('idle');

      // Pseudo-random selection of exactly 24 blue (0-249) and 26 orange (250-499) for 48% result
      const repIds = new Set([
        12, 23, 34, 45, 56, 67, 78, 89, 100, 111, 122, 133, 144, 155, 166, 177, 188, 199, 210, 221, 232, 243, 15, 85,
        260, 271, 282, 293, 304, 315, 326, 337, 348, 359, 370, 381, 392, 403, 414, 425, 436, 447, 458, 469, 480, 491, 255, 300, 350, 450
      ]);

      // Generate 500 dots (250 blue, 250 orange)
      const dots = Array.from({ length: 500 }).map((_, i) => ({
        id: i,
        type: i < 250 ? 'blue' : 'orange',
        isTechClub: i < 45 || (i >= 250 && i < 255), // 45 blue + 5 orange = 50 biased dots
        isRep: repIds.has(i)
      }));

      return (
        <div className="space-y-8 animate-fadeIn">
          <div>
            <h2 className="text-3xl font-bold text-slate-800 mb-2">Section 2: Representative vs Biased Samples</h2>
            <p className="text-slate-600 text-lg">Now that we understand what a sample is and why we need to conduct sampling, let's move on to the concepts of representative vs. biased samples.</p>
          </div>

          <div className="bg-white border-l-4 border-blue-500 p-6 rounded-r-xl shadow-sm">
            <p className="text-lg">
              <strong className="text-blue-700">Representative sample:</strong> A sample that looks like a mini-version of the population.<br/>
              <strong className="text-red-600">Biased sample:</strong> A sample that systematically over/under-represents one (or more) specific sub-population over another.
            </p>
          </div>

          <div className="bg-slate-800 rounded-xl p-6 text-white shadow-xl">
            <h3 className="font-bold text-xl mb-2 text-blue-300">Simulation: Visualising representative and biased samples</h3>
            <p className="text-slate-300 mb-6">
              Imagine you want to find out what proportion of TJC students enjoy online learning. For simplicity's sake, let's imagine that there are only 500 students in TJC with <span className="text-blue-400 font-bold">50% loving online learning</span> and <span className="text-orange-400 font-bold">50% hating it</span>. Note that in reality, you would not already know this information (if you did, there would be no need to survey a sample to find it out). We are revealing the actual proportions of the population who love/hate online learning here just to illustrate the implications of having a representative vs biased sample.
            </p>

            <div className="flex gap-4 mb-8">
              <button onClick={() => setSimState('biased')} className="flex-1 bg-red-600 hover:bg-red-500 text-white py-3 rounded-lg font-bold transition-all">
                Sample the "Hack Club"
              </button>
              <button onClick={() => setSimState('representative')} className="flex-1 bg-green-600 hover:bg-green-500 text-white py-3 rounded-lg font-bold transition-all">
                Sample Randomly
              </button>
            </div>

            {/* Custom 25-column grid for dense points */}
            <div className="grid gap-1 mb-6 p-4 bg-slate-900 rounded-lg max-w-2xl mx-auto" style={{ gridTemplateColumns: 'repeat(25, minmax(0, 1fr))' }}>
              {dots.map(dot => {
                let isHighlighted = false;
                let isFaded = false;
                if (simState === 'biased') {
                  isHighlighted = dot.isTechClub;
                  isFaded = !dot.isTechClub;
                } else if (simState === 'representative') {
                  isHighlighted = dot.isRep;
                  isFaded = !isHighlighted;
                }
                return (
                  <div key={dot.id} className={`w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-full mx-auto transition-all duration-500 ${dot.type === 'blue' ? 'bg-blue-400' : 'bg-orange-400'} ${isHighlighted ? 'scale-150 ring-1 ring-white shadow-[0_0_8px_rgba(255,255,255,0.8)]' : ''} ${isFaded ? 'opacity-20' : ''}`} />
                );
              })}
            </div>

            <div className="h-24 flex items-center justify-center">
              {simState === 'biased' && (
                <div className="text-center animate-bounce">
                  <h4 className="text-3xl font-black text-red-500 mb-1 flex items-center gap-2 justify-center"><i className="fa-solid fa-triangle-exclamation"></i> BIASED!</h4>
                  <p className="text-red-200">Result: 90% Love Online Learning. You completely missed the true 50%!</p>
                </div>
              )}
              {simState === 'representative' && (
                <div className="text-center animate-bounce">
                  <h4 className="text-3xl font-black text-green-400 mb-1 flex items-center gap-2 justify-center"><i className="fa-regular fa-circle-check"></i> REPRESENTATIVE!</h4>
                  <p className="text-green-200">Result: 48% Love Online Learning. Your sample clustered around the true 50%.</p>
                </div>
              )}
              {simState === 'idle' && <p className="text-slate-400 italic">Click a button to collect your sample data.</p>}
            </div>
          </div>
        </div>
      );
    };

    // --- SECTION 3: SIMPLE RANDOM SAMPLING ---
    const Section3 = () => {
      // ACTUAL GOOGLE SHEET DATA:
      const populationString = "Yes, Yes, No, Yes, Yes, Yes, No, Yes, Yes, No, Yes, No, Yes, Yes, Yes, No, Yes, Yes, Yes, No, No, Yes, Yes, Yes, Yes, Yes, No, No, Yes, Yes, Yes, Yes, Yes, No, No, Yes, Yes, Yes, Yes, No, Yes, Yes, No, Yes, Yes, Yes, No, Yes, Yes, No, No, Yes, Yes, Yes, No, Yes, Yes, Yes, No, Yes, Yes, Yes, Yes, Yes, Yes, No, No, Yes, No, Yes, Yes, No, Yes, No, Yes, Yes, Yes, Yes, Yes, No, Yes, Yes, No, Yes, Yes, No, Yes, Yes, No, Yes, No, No, Yes, Yes, Yes, Yes, No, Yes, Yes, Yes, Yes, Yes, Yes, No, Yes, No, Yes, Yes, No, Yes, No, Yes, Yes, Yes, Yes, No, Yes, Yes, Yes, No, Yes, No, No, Yes, Yes, Yes, Yes, No, Yes, Yes, Yes, Yes, Yes, Yes, Yes, Yes, No, No, No, Yes, Yes, No, Yes, Yes, No, Yes, Yes, No, Yes, Yes, Yes, Yes, No, Yes, Yes, Yes, Yes, No, No, Yes, No, Yes, Yes, No, Yes, Yes, Yes, Yes, Yes, No, Yes, Yes, Yes, Yes, No, Yes, No, Yes, No, Yes, Yes, Yes, No, No, Yes, Yes, Yes, No, Yes, Yes, No, Yes, Yes, Yes, Yes, No, No, Yes, Yes, Yes, No, No, Yes, Yes, Yes, Yes, Yes, No, Yes, Yes, Yes, Yes, Yes, No, Yes, Yes, No, Yes, Yes, No, Yes, No, Yes, Yes, Yes, No, Yes, Yes, No, Yes, Yes, Yes, No, Yes, No, Yes, Yes, Yes, Yes, No, Yes, Yes, No, Yes, No, No, Yes, Yes, Yes, Yes, Yes, No, Yes, No, Yes, Yes, Yes, No, No, Yes, No, Yes, Yes, Yes, Yes, Yes, No, Yes, Yes, Yes, Yes, No, Yes, Yes, No, No, Yes, Yes, No, Yes, Yes, Yes, Yes, No, Yes, Yes, Yes, Yes, Yes, Yes, No, No, Yes, Yes, Yes, No, Yes, Yes, No, Yes, Yes, Yes, Yes, No, Yes, No, Yes, Yes, No, Yes, Yes, Yes, No, Yes, No, Yes, Yes, No, Yes, Yes, No, Yes, Yes, Yes, Yes, Yes, Yes, No, No, Yes, Yes, Yes, No, Yes, Yes, No, Yes, Yes, No, Yes, Yes, No, Yes, No, Yes, Yes, Yes, Yes, Yes, No, Yes, Yes, No, Yes, No, Yes, No, Yes, Yes, Yes, No, Yes, Yes, Yes, Yes, Yes, Yes, No, Yes, No, Yes, Yes, No, No, Yes, No, Yes, Yes, Yes, Yes, Yes, No, Yes, Yes, Yes, Yes, No, Yes, No, Yes, No, Yes, Yes, Yes, Yes, No, No, Yes, Yes, Yes, Yes, No, Yes, Yes, No, Yes, Yes, Yes, No, Yes, Yes, Yes, No, No, Yes, Yes, Yes, No, Yes,       const populationData = populationString.split(", ");
      
      const likesProjectWork = (id) => populationData[id - 1] === "Yes";
      const totalLikes = populationData.filter(ans => ans === "Yes").length;
      const truePopPercentage = (totalLikes / populationData.length) * 100;

                <span className="text-slate-600 text-sm">Attempt simple random sampling. Write in to the Ministry of Education (MOE) to request a list of names of all teachers in Singapore who live more than 10km from their schools and their contact details so that you can draw a simple random sample and survey them.</span>
              </button>
              
              <button onClick={() => setChoice('B')} className={`p-4 rounded-xl border-2 text-left transition-all ${choice === 'B' ? 'border-emerald-500 bg-emerald-50' : 'border-slate-200 hover:border-slate-400'}`}>
                <strong className="block mb-2 text-slate-800">Option B: The Realist</strong>
                <span className="text-slate-600 text-sm">Post your survey link on all the channels you have access to (e.g., Whatsapp) and ask for help from your teachers, friends, and family to disseminate it to teachers whom they may know to live more than 10km from school.</span>

    const Section5 = () => {

            </div>

              <div className="flex justify-between mb-2">
                <span className="font-bold text-slate-700 uppercase text-sm tracking-wide">Estimated Probability of Bias</span>

              </div>
              <div className="w-full bg-slate-100 border border-slate-200 rounded-full h-8 overflow-hidden relative shadow-inner">
                <div className="h-full transition-all duration-300 bg-red-500 relative" style={{ width: `${100 - sliderVal}%`, opacity: Math.max(0.3, (100 - sliderVal) / 100) }}>

              </div>
            </div>

                <p className="text-lg font-medium text-slate-800">
                  <span className="text-emerald-600 font-bold block mb-2 text-2xl">Zero Bias (Census)</span>

                </p>

                <p className="text-lg font-medium text-slate-700">
                  <span className="text-red-500 font-bold block mb-2 text-2xl">High Risk of Bias</span>

                </p>
              ) : (
                <p className="text-lg font-medium text-slate-800">
                  <span className="text-green-600 font-bold block mb-2 text-2xl">Lower Risk of Bias</span>

                </p>

            </div>

            <div className="bg-blue-50 border border-blue-200 p-6 rounded-xl">
              <h3 className="font-bold text-lg mb-2">Real-World Industry Standard</h3>
              <p className="text-sm text-slate-700 mb-4">In the real world, professional researchers aim for a sample size that provides <strong>95% confidence level</strong> and a <strong>5% margin of error</strong>. What this means is that results from the sample have a 95% probability of being within 5% of the true population results. The required sample sizes to achieve this will vary with the population size. Try keying in various population sizes below to see what the required sample sizes are.</p>
              <div className="bg-white p-4 rounded-lg shadow-inner mb-4">
                <label className="block text-sm font-bold text-slate-600 mb-1">Enter Target Population Size:</label>
                <input type="number" value={popSize} onChange={(e) => setPopSize(parseInt(e.target.value) || '')} className="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none text-lg" />
              </div>
              <div className="bg-blue-600 text-white p-4 rounded-lg text-center shadow-md">
                <span className="block text-sm opacity-80 uppercase tracking-wide">Required Sample Size</span>
                <span className="text-4xl font-black">{recommendedSize}</span>
              </div>
            </div>

            <div className="bg-slate-800 text-white p-6 rounded-xl shadow-lg flex flex-col justify-center">
              <h3 className="font-bold text-2xl mb-4 text-emerald-400">The PW Reality (N=30)</h3>
              <p className="mb-4 text-slate-300">For school project work, getting enough responses for 95% confidence level and 5% margin of error is often impossible. Instead, a recognized minimum is <strong>30 respondents</strong>.</p>
              <p className="text-sm text-slate-400 bg-slate-900 p-4 rounded-lg border border-slate-700">
                Why 30? It allows a mathematical concept called the <strong>Central Limit Theorem</strong> to hold, which basically means your sample is large enough for you to do statistical analysis such as hypothesis testing. Both Central Limit Theorem and Hypothesis Testing are concepts you will eventually learn in H1 and H2 Mathematics. For PW, it is sufficient to know that you should try to hit a sample size of 30.
              </p>
            </div>
          </div>
        </div>
      );
    };

    // --- SECTION 6: SURVEY DESIGN ---
    const Section6 = () => {
      return (
        <div className="space-y-8 animate-fadeIn">
          <div>
            <h2 className="text-3xl font-bold text-slate-800 mb-2">Section 6: Survey Design Overview</h2>
            <p className="text-slate-600 text-lg">The Basic Structure of a Project Work Survey</p>
          </div>

          <div className="bg-white border border-slate-200 p-6 sm:p-8 rounded-xl shadow-sm">
            <p className="text-slate-700 mb-8 text-lg text-center font-medium">A well-designed survey is organized into three clear, distinct parts. Here is the standard overview:</p>
            
            <div className="space-y-6 max-w-3xl mx-auto">
              {/* Part 1 */}
              <div className="flex items-start gap-4 p-5 sm:p-6 bg-blue-50 border-l-4 border-blue-500 rounded-r-xl shadow-sm transition-all hover:shadow-md">
                <div className="bg-blue-200 text-blue-700 p-3 rounded-full flex-shrink-0 mt-1 sm:mt-0">
                  <i className="fa-solid fa-address-card text-xl"></i>
                </div>
                <div>
                  <h3 className="font-bold text-xl text-blue-900 mb-2">Part 1: Demographic Info</h3>
                  <p className="text-slate-700">These are your screening questions and basic background info (e.g., Age, Gender, School). Placing these at the start helps filter out irrelevant respondents immediately and helps you group your data later.</p>
                </div>
              </div>

              {/* Part 2 */}
              <div className="flex items-start gap-4 p-5 sm:p-6 bg-indigo-50 border-l-4 border-indigo-500 rounded-r-xl shadow-sm transition-all hover:shadow-md">
                <div className="bg-indigo-200 text-indigo-700 p-3 rounded-full flex-shrink-0 mt-1 sm:mt-0">
                  <i className="fa-solid fa-list-check text-xl"></i>
                </div>
                <div>
                  <h3 className="font-bold text-xl text-indigo-900 mb-2">Part 2: Main Survey Questions</h3>
                  <p className="text-slate-700">The core of your research! <strong className="text-indigo-800 bg-indigo-200/50 px-1 rounded">At least 90% of these should be close-ended</strong> (e.g., Multiple Choice or Likert scales) so you can actually quantify and analyze the data effectively without having to read hundreds of paragraphs.</p>
                </div>
              </div>

              {/* Part 3 */}
              <div className="flex items-start gap-4 p-5 sm:p-6 bg-emerald-50 border-l-4 border-emerald-500 rounded-r-xl shadow-sm transition-all hover:shadow-md">
                <div className="bg-emerald-200 text-emerald-700 p-3 rounded-full flex-shrink-0 mt-1 sm:mt-0">
                  <i className="fa-solid fa-handshake-angle text-xl"></i>
                </div>
                <div>
                  <h3 className="font-bold text-xl text-emerald-900 mb-2">Part 3: Thank You Message</h3>
                  <p className="text-slate-700">A brief closing message to thank the respondent for their time. It is also good practice to include a short sentence explaining how their anonymous data will be used for your school project.</p>
                </div>
              </div>
            </div>

            <div className="mt-10 text-center bg-slate-800 text-white p-5 rounded-xl shadow-inner">
              <p className="font-medium text-lg flex flex-col sm:flex-row items-center justify-center gap-3">
                <i className="fa-solid fa-lightbulb text-yellow-400 text-2xl animate-pulse"></i> 
                We will dive into the specific rules, tips, and tricks for mastering each of these sections next!
              </p>
            </div>
          </div>
        </div>
      );
    };

    // --- SECTION 7: DEMOGRAPHICS ---
    const Section7 = () => {
      const [cardIndex, setCardIndex] = useState(0);
      const [feedback, setFeedback] = useState(null);
      const [isFinished, setIsFinished] = useState(false);
      const [singStatAns, setSingStatAns] = useState('');
      
      const cards = [
        { q: "What is your CCA?", isDepends: true, reason: "It is purposeful if you intend to study whether students from different CCAs have different attitudes towards JC canteen food. But it is pointless otherwise." },
        { q: "What is your exact household income in $?", useful: false, reason: "Pointless & Invasive! Ask broad income brackets only if highly relevant." },
        { q: "Are you currently studying in a JC?", useful: true, reason: "Purposeful! This is a Screening question. If they say no, kick them out." },
        { q: "What is your NRIC?", useful: false, reason: "ILLEGAL! PDPA violation. Never ask for NRIC for a school project." }
      ];

      const handleSwipe = (isUseful) => {
        const current = cards[cardIndex];
        if (current.isDepends) {
          setFeedback({ type: 'depends', text: current.reason });
        } else {
          setFeedback({ type: isUseful === current.useful ? 'correct' : 'wrong', text: current.reason });
        }
      };

      const closeFeedback = () => {
        setFeedback(null);
        if (cardIndex < cards.length - 1) {
          setCardIndex(prev => prev + 1);
        } else {
          setIsFinished(true);
        }
      };

      const resetGame = () => {
        setCardIndex(0);
        setIsFinished(false);
        setFeedback(null);
      };

      return (
        <div className="space-y-8 animate-fadeIn">
          <div><h2 className="text-3xl font-bold text-slate-800 mb-2">Section 7: The "Who Are You?"</h2><p className="text-slate-600 text-lg">Demographics and Data Privacy (PDPA)</p></div>
          <div className="grid md:grid-cols-3 gap-4 mb-8">
            <div className="bg-blue-50 p-4 rounded-lg border border-blue-200"><strong className="block text-blue-900 mb-1">1. To Screen</strong><span className="text-sm text-slate-700">Kick out people who aren't in your target population.</span></div>
            <div className="bg-purple-50 p-4 rounded-lg border border-purple-200"><strong className="block text-purple-900 mb-1">2. Balance Tests</strong><span className="text-sm text-slate-700">Check if your sample matches real-world demographics.</span></div>
            <div className="bg-orange-50 p-4 rounded-lg border border-orange-200"><strong className="block text-orange-900 mb-1">3. Sub-Populations</strong><span className="text-sm text-slate-700">See if different groups answer differently.</span></div>
          </div>
          
          <div className="bg-slate-800 p-8 rounded-xl shadow-xl flex flex-col items-center text-center relative overflow-hidden">
            <h3 className="font-bold text-white text-xl mb-2">Swipe Game: Pointless or Purposeful?</h3>
            <p className="text-slate-300 mb-6 text-sm">Project Topic: Attitudes toward JC canteen food.</p>
            
            <div className="relative w-full max-w-sm">
              <div className={`bg-white p-8 rounded-2xl shadow-2xl relative transition-all duration-500 ${isFinished ? 'grayscale opacity-40 pointer-events-none scale-95' : ''}`}>
                {feedback && (
                  <div className="absolute inset-0 z-20 flex flex-col items-center justify-center p-6 rounded-2xl bg-white/95 backdrop-blur-sm text-slate-800 text-center animate-fadeIn">
                    <div className={`w-16 h-16 rounded-full flex items-center justify-center mb-3 ${feedback.type === 'correct' ? 'bg-green-100 text-green-600' : feedback.type === 'wrong' ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'}`}>
                      <i className={`fa-solid text-3xl ${feedback.type === 'correct' ? 'fa-check' : feedback.type === 'wrong' ? 'fa-xmark' : 'fa-scale-balanced'}`}></i>
                    </div>
                    <h4 className={`text-2xl font-black mb-2 ${feedback.type === 'correct' ? 'text-green-600' : feedback.type === 'wrong' ? 'text-red-600' : 'text-blue-600'}`}>
                      {feedback.type === 'correct' ? "That's right!" : feedback.type === 'wrong' ? "Oops!" : "It depends!"}
                    </h4>
                    <p className="text-base font-medium mb-6 leading-snug">{feedback.text}</p>
                    <button onClick={closeFeedback} className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-3 rounded-xl font-bold w-full transition-colors">
                      {cardIndex < cards.length - 1 ? 'Next Question' : 'Finish'}
                    </button>
                  </div>
                )}
                
                <p className="text-2xl font-bold text-slate-800 mb-8 min-h-[80px] flex items-center justify-center">"{cards[cardIndex].q}"</p>
                <div className="flex gap-4">
                  <button onClick={() => handleSwipe(false)} className="flex-1 bg-red-100 hover:bg-red-200 text-red-700 py-3 rounded-xl font-bold transition-colors">Pointless</button>
                  <button onClick={() => handleSwipe(true)} className="flex-1 bg-green-100 hover:bg-green-200 text-green-700 py-3 rounded-xl font-bold transition-colors">Purposeful</button>
                </div>
              </div>

              {isFinished && (
                <div className="absolute inset-0 z-30 flex flex-col items-center justify-center p-6 animate-fadeIn">
                  <div className="bg-slate-800 text-white p-6 rounded-2xl shadow-2xl text-center border-4 border-slate-700">
                    <i className="fa-regular fa-circle-check text-5xl text-green-400 mb-3"></i>
                    <p className="font-bold text-xl mb-4">All done!</p>
                    <button onClick={resetGame} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold">
                      <i className="fa-solid fa-rotate-right mr-2"></i> Play Again
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
          
          <div className="border-2 border-red-200 bg-red-50 p-6 rounded-xl relative">
            <div className="absolute top-0 right-0 bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-bl-lg rounded-tr-lg">MINI CHALLENGE</div>
            <h3 className="font-bold text-red-900 text-lg mb-2">The SingStat WebQuest</h3>
            <p className="text-red-800 mb-4">Your survey sample returned <strong>80% Females and 20% Males</strong>. Is this balanced? Go to <a href="https://www.singstat.gov.sg" target="_blank" className="underline font-bold text-red-600">singstat.gov.sg</a> (or guess!) to find the true gender split of Singapore's youth population.</p>
            <div className="flex items-center gap-3">
              <input type="number" placeholder="True Male %" value={singStatAns} onChange={(e) => setSingStatAns(e.target.value)} className="border p-2 rounded w-32 focus:ring-2 focus:ring-red-400 outline-none" />
            </div>
            {singStatAns && <p className="mt-3 text-sm font-medium text-red-700">*Hint: In reality, it is roughly 51% Male / 49% Female. Your sample of 80% Female is heavily biased and fails the balance test!</p>}
          </div>
        </div>
      );
    };

    // --- SECTION 8: INTERROGATION ROOM ---
    const Section8 = () => {
      const [fixed, setFixed] = useState({ q1: false, q2: false, q3: false });
      const [optionErrorClicked, setOptionErrorClicked] = useState(false);

      return (
        <div className="space-y-8 animate-fadeIn">
          <div><h2 className="text-3xl font-bold text-slate-800 mb-2">Section 8: The Interrogation Room</h2><p className="text-slate-600 text-lg">Crafting the Main Questions</p></div>
          <div className="bg-yellow-50 border border-yellow-200 p-4 rounded-xl text-yellow-900"><strong>Rule of Thumb:</strong> Use closed-ended questions (Multiple Choice/Likert Scales) for 90% of your survey. Open-ended paragraphs are a nightmare to code and analyze manually.</div>
          <div className="bg-slate-900 text-slate-300 p-6 rounded-xl shadow-lg">
            <h3 className="font-bold text-xl text-white mb-6">Common Survey Mistakes</h3>
            
            <div className="mb-6 bg-slate-800 p-4 sm:p-6 rounded-lg border border-slate-700">
              <div className="flex justify-between items-start mb-2"><span className="text-red-400 font-bold uppercase text-xs tracking-wider">Double-Barreled</span>{fixed.q1 && <i className="fa-regular fa-circle-check text-green-400 text-xl"></i>}</div>
              <p className="text-white text-lg font-medium mb-4 italic">"Do you think the MRT is fast and affordable?"</p>
              
              {!fixed.q1 ? (
                 <div className="space-y-4">
                   <p className="text-sm text-slate-400 leading-relaxed">Double-barreled questions are questions that ask two (or more) things at the same time. The problem with such questions is that when respondents agree/disagree, you cannot tell exactly what they are agreeing/disagreeing to. For example, in the above question, if respondents disagree, you do not know if they think the MRT is not fast or not affordable or both.</p>
                   <button onClick={() => setFixed({...fixed, q1: true})} className="w-full text-center p-3 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-bold transition-colors shadow-md">Click here to see the fix</button>
                 </div>
              ) : (
                <div className="bg-green-400/10 p-4 rounded-lg border border-green-500/30 animate-fadeIn">
                  <p className="text-green-400 font-bold mb-2">Fixed! Never ask two things in one question.</p>
                  <p className="text-green-200">Split into two separate questions:<br/>1. "Do you think the MRT is fast?"<br/>2. "Do you think the MRT is affordable?"</p>
                </div>
              )}
            </div>
            
            <div className="mb-6 bg-slate-800 p-4 sm:p-6 rounded-lg border border-slate-700">
              <div className="flex justify-between items-start mb-2"><span className="text-red-400 font-bold uppercase text-xs tracking-wider">Leading</span>{fixed.q2 && <i className="fa-regular fa-circle-check text-green-400 text-xl"></i>}</div>
              <p className="text-white text-lg font-medium mb-4 italic">"Don't you agree that the recent tuition fee hike is unfair?"</p>
              
              {!fixed.q2 ? (
                 <div className="space-y-4">
                   <p className="text-sm text-slate-400 leading-relaxed">Leading questions subtly prompt or encourage the respondent to answer in a particular way. They contain built-in opinions or assumptions. The problem is that they bias your data because respondents feel pressured to agree with the stated premise rather than giving their true, honest opinion.</p>
                   <button onClick={() => setFixed({...fixed, q2: true})} className="w-full text-center p-3 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-bold transition-colors shadow-md">Click here to see the fix</button>
                 </div>
              ) : (
                <div className="bg-green-400/10 p-4 rounded-lg border border-green-500/30 animate-fadeIn">
                  <p className="text-green-400 font-bold mb-2">Fixed! Keep the phrasing completely neutral.</p>
                  <p className="text-green-200">Ask instead:<br/>"What is your opinion on the recent tuition fee hike?"</p>
                </div>
              )}
            </div>

            <div className="mb-6 bg-slate-800 p-4 sm:p-6 rounded-lg border border-slate-700">
              <div className="flex justify-between items-start mb-2"><span className="text-red-400 font-bold uppercase text-xs tracking-wider">Vague Phrasing</span>{fixed.q3 && <i className="fa-regular fa-circle-check text-green-400 text-xl"></i>}</div>
              <p className="text-white text-lg font-medium mb-4 italic">"Do you exercise regularly?"</p>
              
              {!fixed.q3 ? (
                 <div className="space-y-4">
                   <p className="text-sm text-slate-400 leading-relaxed">Vague questions use subjective words that mean different things to different people. For example, "regularly" might mean five times a week to an athlete, but once a month to someone else. Because respondents are defining the word differently in their heads, your data becomes completely unreliable and impossible to compare accurately.</p>
                   <button onClick={() => setFixed({...fixed, q3: true})} className="w-full text-center p-3 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-bold transition-colors shadow-md">Click here to see the fix</button>
                 </div>
              ) : (
                <div className="bg-green-400/10 p-4 rounded-lg border border-green-500/30 animate-fadeIn">
                  <p className="text-green-400 font-bold mb-2">Fixed! Use concrete terms and timeframes.</p>
                  <p className="text-green-200">Ask instead:<br/>"How many times per week do you exercise for at least 30 minutes?"</p>
                </div>
              )}
            </div>

          </div>
          <div className="grid md:grid-cols-2 gap-6">
            <div className="border-2 border-slate-200 p-6 rounded-xl bg-white">
              <h3 className="font-bold text-lg mb-4">Response Validator</h3>
              <p className="text-sm text-slate-600 mb-4">Click on the critical error in these options:</p>
              <div className="p-4 bg-slate-50 rounded border mb-4">
                <p className="font-medium mb-2">How old are you?</p>
                <ul className="space-y-2">
                  <li className="p-2 border rounded bg-white">A) 15-16</li>
                  <li onClick={() => setOptionErrorClicked(true)} className={`p-2 border rounded cursor-pointer transition-all ${optionErrorClicked ? 'bg-red-100 border-red-500' : 'bg-white hover:bg-red-50'}`}>B) 16-17 {optionErrorClicked && <span className="text-red-600 font-bold ml-2">&larr; ERROR!</span>}</li>
                  <li className="p-2 border rounded bg-white">C) 18-19</li>
                </ul>
              </div>
              {optionErrorClicked && <div className="text-sm text-red-700 bg-red-50 p-3 rounded"><strong>Not Mutually Exclusive!</strong> Options must never overlap.</div>}
            </div>
            <div className="bg-indigo-50 border-2 border-indigo-200 p-6 rounded-xl flex flex-col justify-center">
              <h3 className="font-bold text-indigo-900 text-lg mb-2">Why we love the 4-Point Likert Scale</h3>
              <p className="text-indigo-800 text-sm mb-4">Strongly Disagree / Disagree / Agree / Strongly Agree</p>
              <p className="text-slate-700">A 5-point scale gives respondents a "Middle/Neutral" trap. <strong>Force them to make a choice!</strong></p>
            </div>
          </div>
        </div>
      );
    };

    // --- SECTION 9: GOOGLE FORMS ---
    const Section9 = () => {
      return (
        <div className="space-y-8 animate-fadeIn">
          <div><h2 className="text-3xl font-bold text-slate-800 mb-2">Section 9: Bringing It To Life</h2><p className="text-slate-600 text-lg">Google Forms & Pilot Testing</p></div>
          
          {/* Intro to Google Forms Video */}
          <div className="bg-white border shadow-lg rounded-xl overflow-hidden font-sans">
            <div className="bg-[#673ab7] text-white p-4 flex items-center gap-2"><i className="fa-brands fa-google"></i> <strong>Introduction to Google Forms</strong></div>
            <div className="p-6 bg-purple-50/30 grid md:grid-cols-2 gap-6 items-start">
              <div className="w-full aspect-video rounded-lg overflow-hidden shadow-md bg-slate-200">
                <iframe className="w-full h-full object-cover" src="https://www.youtube.com/embed/mJ_oPeb_YkU" title="Intro to Google Forms" frameBorder="0" allowFullScreen></iframe>
              </div>
              <div className="text-slate-700 text-sm">
                <p className="font-bold text-purple-900 mb-3"><i className="fa-solid fa-circle-info mr-1"></i> Skip this video if you are already familiar with:</p>
                <ul className="list-disc pl-5 space-y-1">
                  <li>Create a New Google Form</li>
                  <li>Add Form Title & Descriptions</li>
                  <li>Add & Edit Questions (and the different question types available)</li>
                  <li>Upload Files in Forms</li>
                  <li>Add Images or Videos</li>
                  <li>How to Add Sections</li>
                  <li>Customize the design of Google Forms</li>
                  <li>Preview Google Forms</li>
                  <li>Adjust Google Form Settings</li>
                  <li>Publish Forms</li>
                  <li>Share Your Google Form</li>
                  <li>Review Form Responses</li>
                </ul>
              </div>
            </div>
          </div>

          {/* Advanced Features Videos */}
          <div className="bg-slate-50 border p-6 rounded-xl shadow-sm">
            <h3 className="font-bold text-xl text-slate-800 mb-6 flex items-center gap-2">
              <i className="fa-solid fa-graduation-cap text-blue-600"></i> Advanced Google Form Features
            </h3>
            <div className="grid md:grid-cols-2 gap-6">
              {/* Branching Logic */}
              <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 flex flex-col">
                <h4 className="font-bold text-slate-700 mb-3 text-center">Branching Logic</h4>
                <div className="w-full aspect-video rounded-lg overflow-hidden shadow-sm mb-4 bg-slate-200">
                  <iframe className="w-full h-full object-cover" src="https://www.youtube.com/embed/w5f73wZoXsw" title="Branching Logic" frameBorder="0" allowFullScreen></iframe>
                </div>
                <p className="text-sm text-slate-600 text-center flex-1">Learn how to send respondents to different sections based on their answers (e.g., screening questions).</p>
              </div>
              
              {/* Response Validation */}
              <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 flex flex-col">
                <h4 className="font-bold text-slate-700 mb-3 text-center">Response Validation</h4>
                <div className="w-full aspect-video rounded-lg overflow-hidden shadow-sm mb-4 bg-slate-200">
                  <iframe className="w-full h-full object-cover" src="https://www.youtube.com/embed/hRsR22ipX5k" title="Response Validation" frameBorder="0" allowFullScreen></iframe>
                </div>
                <p className="text-sm text-slate-600 text-center flex-1">Ensure respondents enter numbers or specific formats, saving you hours of data cleaning later!</p>
              </div>
            </div>
          </div>

          {/* Pilot Testing Challenge */}
          <div className="bg-red-50 border border-red-200 p-6 sm:p-8 rounded-xl shadow-sm">
            <div className="flex flex-col md:flex-row items-start gap-6">
              <div className="bg-red-200 text-red-700 w-16 h-16 rounded-full flex items-center justify-center flex-shrink-0 shadow-sm mx-auto md:mx-0">
                <i className="fa-solid fa-bullseye text-3xl"></i>
              </div>
              <div className="flex-1 text-center md:text-left">
                <h3 className="font-bold text-red-900 text-2xl mb-2">The Final Boss: Pilot Test</h3>
                <p className="text-slate-700 text-lg mb-6">
                  Before you blast your link to 200 people... what is the absolute last step? <strong>Send it to 3 friends first!</strong> Have them try to "break" the survey, look for typos, and test your branching logic.
                </p>
                <div className="bg-white p-6 rounded-lg border-l-4 border-red-500 shadow-sm text-left">
                  <h4 className="font-bold text-red-800 mb-2">Mini Challenge: Be the Pilot Tester</h4>
                  <p className="text-sm text-slate-600 mb-5">Imagine you received this survey draft from a classmate. Can you spot the errors in their survey design before they publish it?</p>
                  <a href="https://docs.google.com/forms/d/e/1FAIpQLSdEf0nV8RxLsFw8ST64a8UMIAiem3-28TYPdkAMPI15kiWVLg/viewform?usp=dialog" target="_blank" className="inline-flex items-center gap-2 bg-red-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-red-700 transition-colors shadow-md w-full sm:w-auto justify-center">
                    <i className="fa-solid fa-arrow-up-right-from-square"></i> Test the Flawed Survey
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- SECTION 10: CHEATSHEET ---
    const Section10 = () => (
      <div className="space-y-8 animate-fadeIn">
        <div className="text-center">
          <h2 className="text-4xl font-black text-slate-800 mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">Module Complete!</h2>

          <div className="p-0 overflow-x-auto">
            <table className="w-full text-left border-collapse">
              <thead><tr className="bg-slate-100"><th className="p-4 border-b-2 border-slate-200 font-bold text-slate-800 w-1/2">The Survey Sin</th><th className="p-4 border-b-2 border-slate-200 font-bold text-slate-800 w-1/2">The Fix</th></tr></thead>

                <tr className="hover:bg-slate-50"><td className="p-4"><span className="font-bold text-red-600 block mb-1">Vague Phrasing</span>("Do you go often?")</td><td className="p-4 font-medium text-green-700">Use concrete terms ("Do you go 3+ times a week?").</td></tr>
